name: Deploy to Railway

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Trigger Railway Deployment via API
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          echo "Triggering Railway deployment..."
          RESPONSE=$(curl -s -X POST "https://backboard.railway.app/graphql/v2" \
            -H "Authorization: Bearer $RAILWAY_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{
              "query": "mutation { serviceInstanceDeploy(serviceId: \"a669f50c-0bcf-4b5d-89e8-5de970539c7e\", environmentId: \"9f57285f-a7aa-4b41-bc5a-0d7e5362a220\") }"
            }')
          echo "Response: $RESPONSE"
          if echo "$RESPONSE" | grep -q '"serviceInstanceDeploy":true'; then
            echo "✅ Railway deployment triggered successfully!"
          else
            echo "❌ Deployment trigger failed: $RESPONSE"
            exit 1
          fi
