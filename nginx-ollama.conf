server {
    listen 80;
    server_name _;
    client_max_body_size 10M;

    location / {
        root /var/www/ollama-ui;
        index index.html;
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    location /health {
        return 200 "DevCulture VPS OK\n";
        add_header Content-Type text/plain;
    }
}
